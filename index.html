<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تکنولوژی دیبا</title>
    <style>
        /* پس‌زمینه خاکستری روشن */
        body { 
            font-family: 'Tahoma', sans-serif; 
            text-align: center; 
            background-color: #f0f2f5; 
            padding: 20px;
            margin: 0;
        }
        
        /* کارت سفید وسط صفحه */
        .container { 
            max-width: 400px; 
            margin: auto; 
            background: #ffffff; 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.05); 
        }

        h1 { color: #333; font-size: 22px; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 25px; }

        .btn { 
            display: block; 
            background: #007bff; 
            color: white; 
            padding: 15px; 
            margin: 12px 0; 
            border-radius: 12px; 
            text-decoration: none; 
            font-weight: bold; 
            transition: 0.3s;
        }
        .btn:hover { background: #0056b3; } /* کمی تغییر رنگ هنگام لمس */
        
        .btn-insta { background: #E1306C; }
        .btn-tel { background: #0088cc; }

        h3 { color: #444; margin-top: 30px; font-size: 18px; }
        
        iframe { width: 100%; border-radius: 15px; margin-top: 10px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="container">
    <h1>به تکنولوژی دیبا خوش‌آمدید</h1>
    <p>خدمات تخصصی تعمیرات وفروش</p>

    <a href="tel:09134555175" class="btn">تماس با ما</a>
    <a href="https://instagram.com/your_id" class="btn btn-insta">اینستاگرام ما</a>
    

    <h3>موقعیت ما روی نقشه:</h3>
    <!-- کد نقشه گوگل را اینجا جایگزین کن -->
    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d13554.468223704362!2d54.40747635319553!3d31.862634335789053!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3fa6199bda6de8d1%3A0x4ca719d698cecbf3!2z2YXZiNio2KfbjNmEINmIINqp2KfZhdm-24zZiNiq2LEg2YXYrdmF2K8!5e0!3m2!1sen!2sus!4v1781357224425!5m2!1sen!2sus" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
</div>

</body>
</html>
