<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>کارت ویزیت دیجیتال</title>
  <style>
    body {
      margin: 0;
      font-family: Tahoma, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 24px;
      padding: 28px 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #fff;
      margin-bottom: 16px;
    }

    h1 {
      margin: 8px 0 6px;
      font-size: 28px;
    }

    .subtitle {
      margin: 0 0 18px;
      color: #cbd5e1;
      font-size: 15px;
    }

    .btn {
      display: block;
      text-decoration: none;
      color: white;
      background: #2563eb;
      padding: 14px 16px;
      border-radius: 14px;
      margin: 10px 0;
      font-size: 16px;
      transition: 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      background: #1d4ed8;
    }

    .btn.instagram { background: #e1306c; }
    .btn.instagram:hover { background: #c0265a; }

    .btn.eita { background: #0ea5e9; }
    .btn.eita:hover { background: #0284c7; }

    .btn.phone { background: #16a34a; }
    .btn.phone:hover { background: #15803d; }

    .footer {
      margin-top: 18px;
      font-size: 13px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="avatar" src="https://via.placeholder.com/300" alt="Profile Photo" />
    <h1>نام شما</h1>
    <p class="subtitle">عنوان شغلی یا توضیح کوتاه شما</p>

    <a class="btn instagram" href="https://instagram.com/" target="_blank">اینستاگرام</a>
    <a class="btn eita" href="https://eitaa.com/" target="_blank">ایتا</a>
    <a class="btn phone" href="tel:+989000000000">تماس</a>

    <p class="footer">برای ارتباط سریع از لینک‌های بالا استفاده کنید</p>
  </div>
</body>
</html>
